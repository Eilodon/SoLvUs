version: '3.8'

services:
  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: solvus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================
  # Prover Server
  # ===========================================
  prover-server:
    build:
      context: .
      dockerfile: Dockerfile.prover-server
    container_name: solvus-prover-server
    ports:
      - "3001:3001"
    env_file:
      - config/devnet.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PROVER_PORT=3001
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - ~/.config/solana:/home/solvus/.config/solana:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Frontend
  # ===========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: solvus-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_PROVER_SERVER_URL=http://prover-server:3001
    depends_on:
      - prover-server
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: solvus-network
