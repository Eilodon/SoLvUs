name: Generate Garaga Verifier
on: workflow_dispatch
jobs:
  generate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install GMP deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libgmp3-dev
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install garaga
        run: |
          pip install garaga==1.0.1
          python -c "import garaga_rs; print('OK')"
      - name: Setup Noir
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/refs/heads/main/install | bash
          ~/.nargo/bin/noirup --version 1.0.0-beta.6
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - name: Setup Barretenberg
        run: |
          curl -L https://raw.githubusercontent.com/AztecProtocol/aztec-packages/refs/heads/master/barretenberg/bbup/install | bash
          ~/.bb/bbup --version 0.85.0
          echo "$HOME/.bb" >> $GITHUB_PATH
      - name: Compile circuit
        run: cd circuits && nargo compile
      - name: Generate VK
        run: |
          cd circuits
          bb write_vk --scheme ultra_honk --oracle_hash starknet -b target/solvus.json -o target/
      - name: Generate Cairo verifier
        run: |
          garaga gen --system ultra_starknet_honk \
            --vk circuits/target/vk \
            --project-name verifier
          mkdir -p cairo/src/solvus_verifier
          cp -r verifier/src/* cairo/src/solvus_verifier/
      - name: Commit verifier files
        run: |
          git config user.email "ci@solvus"
          git config user.name "Solvus CI"
          git add cairo/src/solvus_verifier/
          git commit -m "chore: regenerate Cairo verifier via CI" || echo "No changes"
          git push
