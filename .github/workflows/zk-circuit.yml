name: Build Circuit Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'circuits/**'
  pull_request:
    paths:
      - 'circuits/**'

jobs:
  build-circuit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Noir toolchain
        uses: noir-lang/noirup@v0.1.4
        with:
          toolchain: 1.0.0-beta.18

      - name: Build circuit
        run: |
          cd circuits
          nargo build

      - name: Capture circuit metadata
        run: |
          cd circuits
          nargo info --output-json > target/circuit_info.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: circuit-artifacts
          path: |
            circuits/target/*.json
            circuits/target/*.vk
            circuits/target/*.pk
